name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install flake8
      - run: flake8 app/ --max-line-length=120

  test-and-scan:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Secret Scan (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          
      - name: Run Tests
        run: python -m pytest tests/ --cov=app --cov-report=term-missing --cov-fail-under=70
        
      - name: Run Dependency Scan
        run: pip-audit -r requirements.txt

  build-push:
    needs: test-and-scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name == 'push' }} 
          tags: ghcr.io/noticyfalcon/csot-w3-starter/api:latest

  deploy:
    needs: build-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Prepare file contents
        run: |
          echo "B64_COMPOSE=$(base64 -w 0 compose.yaml)" >> $GITHUB_ENV
          echo "B64_NGINX=$(base64 -w 0 nginx/default.conf)" >> $GITHUB_ENV

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          B64_COMPOSE: ${{ env.B64_COMPOSE }}
          B64_NGINX: ${{ env.B64_NGINX }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          port: ${{ secrets.DEPLOY_SSH_PORT }}
          envs: B64_COMPOSE,B64_NGINX,GH_TOKEN,GH_ACTOR
          script: |
            sudo mkdir -p ${{ secrets.DEPLOY_PATH }}/nginx
            sudo mkdir -p ${{ secrets.DEPLOY_PATH }}/data
            sudo chown -R $USER:$USER ${{ secrets.DEPLOY_PATH }}
            cd ${{ secrets.DEPLOY_PATH }}
            
            echo "$B64_COMPOSE" | base64 -d > compose.yaml
            echo "$B64_NGINX" | base64 -d > nginx/default.conf
            
            sed -i 's/"0:80"/"32809:80"/' compose.yaml
            
            echo "$GH_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin
            
            docker compose -p ${{ secrets.COMPOSE_PROJECT_NAME }} pull
            docker compose -p ${{ secrets.COMPOSE_PROJECT_NAME }} up -d