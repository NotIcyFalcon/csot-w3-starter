services:
  api:
    build: .
    restart: always
    volumes:
      - ./data:/app/instance
    environment:
      - DATABASE_URL=sqlite:////app/instance/app.db

  web:
    image: nginx:alpine
    restart: always
    ports:
      - "0:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api